#:schema node_modules/wrangler/config-schema.json

name = "apple-rag-mcp"
main = "worker/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

keep_vars = true

[vars]
ENVIRONMENT = "production"
BATCH_SIZE = "40"
BATCH_COUNT = "20"
FORCE_UPDATE_ALL = "false"

[placement]
mode = "smart"

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "apple-rag-db"
database_id = "d8e71dd7-2ceb-42f7-8f57-ea732d00c768"
migrations_dir = "migrations"

[observability]
enabled = true
head_sampling_rate = 1

[triggers]
crons = ["*/30 * * * *"]

# Development Environment
[env.development]
name = "apple-rag-mcp-dev"
workers_dev = true

[env.development.vars]
ENVIRONMENT = "development"

[[env.development.d1_databases]]
binding = "DB"
database_name = "apple-rag-db-dev"
database_id = "5042640e-d698-4197-a285-6fe81d39e3e7"
