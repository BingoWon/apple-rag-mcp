name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Bump version and release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)

          if [ -z "$LATEST" ]; then
            VERSION=$(node -p "require('./package.json').version")
            echo "Initial release v${VERSION}"
            NOTES="Initial release."
          else
            COMMITS=$(git log "${LATEST}..HEAD" --pretty=format:'%s')

            FEAT=0; FIX=0
            while IFS= read -r msg; do
              [[ -z "$msg" ]] && continue
              if [[ "$msg" =~ ^feat ]]; then FEAT=1
              elif [[ "$msg" =~ ^(fix|perf|refactor|docs|style) ]]; then FIX=1
              fi
            done <<< "$COMMITS"

            if (( !FEAT && !FIX )); then
              echo "No releasable commits since ${LATEST} — skipping."
              exit 0
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            if (( FEAT )); then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            NOTES=$(git log "${LATEST}..HEAD" --pretty=format:'- %s (%h)')
          fi

          CURRENT=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$CURRENT" != "$VERSION" ]; then
            npm version "${VERSION}" --no-git-tag-version

            # Sync version to server.json
            if [ -f server.json ]; then
              node -e "
                const fs = require('fs');
                const sj = JSON.parse(fs.readFileSync('server.json','utf8'));
                sj.version = '${VERSION}';
                fs.writeFileSync('server.json', JSON.stringify(sj, null, 2) + '\n');
              "
            fi

            git add package.json server.json
            git commit -m "chore(release): v${VERSION} [skip ci]"
          fi

          git tag "v${VERSION}"
          git push origin main --tags

          echo "${NOTES}" > /tmp/notes.md
          gh release create "v${VERSION}" --title "v${VERSION}" --notes-file /tmp/notes.md

          echo "RELEASED=true" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: env.RELEASED == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        if: env.RELEASED == 'true'
        run: pnpm run build

      - name: Deploy to Development
        if: env.RELEASED == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm run deploy:dev

      - name: Deploy to Production
        if: env.RELEASED == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm run deploy:prod
